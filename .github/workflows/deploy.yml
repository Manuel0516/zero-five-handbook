name: Deploy

# On every push to master, SSH into the VPS, git pull this repo at
# ~/services/zero-five-handbook, and rebuild the stack there.
# Requires two repository secrets:
#   VPS_HOST     — the VPS address
#   VPS_SSH_KEY  — private half of the dedicated deploy key
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "::error::Repository secret VPS_HOST is missing or empty (Settings → Secrets and variables → Actions → Repository secrets)"
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::Repository secret VPS_SSH_KEY is missing or empty (Settings → Secrets and variables → Actions → Repository secrets)"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null; then
            echo "::error::VPS_SSH_KEY is not a valid private key — re-paste the entire block including the BEGIN and END lines"
            exit 1
          fi
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User manuel
            Port 2020
            IdentityFile ~/.ssh/deploy_key
          EOF
          ssh-keyscan -p 2020 "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          if ! grep -q ssh ~/.ssh/known_hosts; then
            echo "::error::Could not fetch the host key from ${{ secrets.VPS_HOST }}:2020 — check VPS_HOST"
            exit 1
          fi

      - name: Pull and rebuild on the VPS
        run: ssh vps 'cd ~/services/zero-five-handbook && git pull --ff-only && docker compose up -d --build && docker image prune -f'
