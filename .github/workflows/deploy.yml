name: Deploy

# Builds the site image on the runner (the VPS has no RAM headroom for a
# Next.js build), streams it to the VPS over SSH, and restarts the stack.
# Requires two repository secrets:
#   VPS_HOST     — the VPS address
#   VPS_SSH_KEY  — private half of the dedicated deploy key
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t zero-five-handbook:latest .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User manuel
            Port 2020
            IdentityFile ~/.ssh/deploy_key
          EOF
          ssh-keyscan -p 2020 "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ship image to VPS
        run: docker save zero-five-handbook:latest | gzip | ssh vps 'gunzip | docker load'

      - name: Deploy stack
        run: |
          ssh vps 'mkdir -p ~/services/handbook'
          scp docker-compose.yml vps:services/handbook/docker-compose.yml
          ssh vps 'cd ~/services/handbook && docker compose up -d && docker image prune -f'
