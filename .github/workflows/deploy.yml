name: Validate and deploy

# On every push to master, SSH into the VPS, git pull this repo at
# ~/services/zero-five-handbook, and rebuild the stack there.
# Requires three repository secrets. See content/docs/vps/handbook.mdx.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check
        run: npm run types:check

      - name: Lint
        run: npm run lint

      - name: Build the production application
        run: npm run build

      - name: Build the production container
        run: docker build --tag zero-five-handbook:${{ github.sha }} .

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$VPS_HOST" ]; then
            echo "::error::Repository secret VPS_HOST is missing or empty (Settings → Secrets and variables → Actions → Repository secrets)"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Repository secret VPS_SSH_KEY is missing or empty (Settings → Secrets and variables → Actions → Repository secrets)"
            exit 1
          fi
          if [ -z "$VPS_SSH_KNOWN_HOSTS" ]; then
            echo "::error::Repository secret VPS_SSH_KNOWN_HOSTS is missing or empty; copy the verified VPS host-key line into this secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 600 ~/.ssh/known_hosts
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null; then
            echo "::error::VPS_SSH_KEY is not a valid private key — re-paste the entire block including the BEGIN and END lines"
            exit 1
          fi
          cat >> ~/.ssh/config <<EOF
          Host vps
            HostName $VPS_HOST
            User manuel
            Port 2020
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Test the SSH connection
        run: ssh vps 'printf "SSH connection verified\n"'

      - name: Pull, rebuild, and verify on the VPS
        run: |
          ssh vps 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd "$HOME/services/zero-five-handbook"

          git pull --ff-only
          docker compose config --quiet
          docker compose up -d --build --wait --wait-timeout 180

          test "$(docker inspect handbook --format '{{json .HostConfig.PortBindings}}')" = "{}"
          docker compose exec -T handbook node -e \
            "fetch('http://127.0.0.1:3000/docs').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
          curl --fail --silent --show-error --head \
            --resolve docs.zero-five.space:443:10.8.0.1 \
            https://docs.zero-five.space/

          docker compose ps
          docker image prune -f
          REMOTE
