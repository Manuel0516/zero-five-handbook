# Runs on the VPS at ~/services/zero-five-handbook/ — a git clone of this repo.
# Deploy = `git pull && docker compose up -d --build`, triggered by the
# GitHub Actions workflow on every push to master.
services:
  handbook:
    build: .
    image: zero-five-handbook:latest
    container_name: handbook
    restart: unless-stopped
    # Compose reads an optional local .env automatically. Keeping these
    # substitutions here lets the site run without enabling the AI endpoint.
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-}"
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/docs').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [traefik]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.handbook.rule=Host(`docs.zero-five.space`)"
      - "traefik.http.routers.handbook.entrypoints=websecure"
      - "traefik.http.routers.handbook.tls.certresolver=letsencrypt"
      # docs.zero-five.space resolves to 10.8.0.1, so legitimate clients arrive
      # over wg0 with a 10.8.0.x source address. This middleware rejects anyone
      # who instead connects to the public IP with the right Host header.
      - "traefik.http.routers.handbook.middlewares=handbook-vpn-only"
      - "traefik.http.middlewares.handbook-vpn-only.ipwhitelist.sourcerange=10.8.0.0/24"
      - "traefik.http.services.handbook.loadbalancer.server.port=3000"
      - "hub.enable=true"
      - "hub.name=Handbook"
      - "hub.kind=web"
      - "hub.url=https://docs.zero-five.space"
      - "hub.icon=📚"
      - "hub.visibility=admin"

networks:
  traefik:
    external: true
